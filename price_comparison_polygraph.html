table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }

td { padding: 9px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: top; line-height: 1.4; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--color-background-secondary); }
.badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.badge-yann { background: #E6F1FB; color: #0C447C; }
.badge-bit { background: #EAF3DE; color: #27500A; }
.badge-avanta { background: #FAEEDA; color: #633806; }
.badge-foil { background: #FBEAF0; color: #72243E; }
@media (prefers-color-scheme: dark) {
  .badge-yann { background: #0C447C; color: #B5D4F4; }

  .badge-avanta { background: #633806; color: #FAC775; }
  .badge-foil { background: #72243E; color: #F4C0D1; }
}
.cheaper { color: #0F6E56; font-weight: 500; }
.pricier { color: #A32D2D; font-weight: 500; }
.same { color: var(--color-text-secondary); }
.match-type { font-size: 10px; color: var(--color-text-tertiary); margin-top: 2px; }
.search-wrap { position: relative; margin-bottom: 1rem; }
.search-wrap input { width: 100%; padding: 8px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; }
.col-our { width: 22%; }
.col-their { width: 22%; }
.col-comp { width: 10%; }
.col-price-us { width: 11%; }
.col-price-them { width: 11%; }
.col-diff { width: 13%; }
.col-pct { width: 11%; }
</style>

const compColors = {Yann:'badge-yann','Bit Trade':'badge-bit','Avanta Trade':'badge-avanta','Foil Trading':'badge-foil'};
const cats = [...new Set(data.map(d=>d.cat))];
const comps = [...new Set(data.map(d=>d.comp))];
let activeComp = 'all', activeCat = 'all', searchQ = '';

function fmt(n) { return n ? n.toLocaleString('ru-RU') + ' сум' : '—'; }
function pct(us, them) { if (!us || !them) return null; return Math.round((them-us)/us*100); }
function diff(us, them) { if (!us || !them) return null; return them-us; }

function render() {
  searchQ = document.getElementById('search').value.toLowerCase();
  const filtered = data.filter(d => {
    if (activeComp !== 'all' && d.comp !== activeComp) return false;
    if (activeCat !== 'all' && d.cat !== activeCat) return false;
    if (searchQ && !d.us.toLowerCase().includes(searchQ) && !d.them.toLowerCase().includes(searchQ)) return false;
    return true;
  });
  const tbody = document.getElementById('tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('empty').style.display = 'block';
  } else {
    document.getElementById('empty').style.display = 'none';
    tbody.innerHTML = filtered.map(d => {
      const p = pct(d.usp, d.theirp);
      const dv = diff(d.usp, d.theirp);
      let pclass = 'same', pstr = '=', dstr = '—';
      if (p !== null) {
        dstr = (dv > 0 ? '+' : '') + dv.toLocaleString('ru-RU') + ' сум';
        if (p > 0) { pclass='pricier'; pstr='+'+p+'%'; }
        else if (p < 0) { pclass='cheaper'; pstr=p+'%'; }
        else { pstr='0%'; }
      }
      return `<tr>
        <td><span style="font-size:12px;color:var(--color-text-tertiary);">${d.cat}</span><br>${d.us}</td>
        <td>${d.them}<div class="match-type">${d.type} совпадение</div></td>
        <td><span class="badge ${compColors[d.comp]}">${d.comp}</span></td>
        <td>${fmt(d.usp)}</td>
        <td>${fmt(d.theirp)}</td>
        <td class="${pclass}">${dstr}</td>
        <td class="${pclass}" style="font-weight:500;">${pstr}</td>
      </tr>`;
    }).join('');
  }
  updateStats(filtered);
}

function updateStats(filtered) {
  const withPrice = filtered.filter(d => d.theirp);
  const cheaper = withPrice.filter(d => d.theirp < d.usp).length;
  const pricier = withPrice.filter(d => d.theirp > d.usp).length;
  const same = withPrice.filter(d => d.theirp === d.usp).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Всего совпадений</div><div class="stat-val">${filtered.length}</div></div>
    <div class="stat"><div class="stat-label">У них дешевле</div><div class="stat-val" style="color:#0F6E56;">${cheaper}</div></div>
    <div class="stat"><div class="stat-label">У нас дешевле</div><div class="stat-val" style="color:#A32D2D;">${pricier}</div></div>
    <div class="stat"><div class="stat-label">Одинаково</div><div class="stat-val">${same}</div></div>
  `;
}

function buildFilters() {
  const f = document.getElementById('filters');
  let html = '<span style="font-size:11px;color:var(--color-text-secondary);">Компания:</span>';
  html += `<button class="filter-btn active" onclick="setComp('all',this)">Все</button>`;
  comps.forEach(c => { html += `<button class="filter-btn" onclick="setComp('${c}',this)">${c}</button>`; });
  html += '<span style="font-size:11px;color:var(--color-text-secondary);margin-left:8px;">Категория:</span>';
  html += `<button class="filter-btn active" onclick="setCat('all',this)">Все</button>`;
  cats.forEach(c => { html += `<button class="filter-btn" onclick="setCat('${c}',this)">${c}</button>`; });
  f.innerHTML = html;
}

function setComp(val, btn) {
  activeComp = val;
  document.querySelectorAll('#filters .filter-btn').forEach(b => {
    if (b.onclick && b.onclick.toString().includes('setComp')) b.classList.remove('active');
  });
  btn.classList.add('active');
  render();
}
function setCat(val, btn) {
  activeCat = val;
  document.querySelectorAll('#filters .filter-btn').forEach(b => {
    if (b.onclick && b.onclick.toString().includes('setCat')) b.classList.remove('active');
  });
  btn.classList.add('active');
  render();
}

buildFilters();
render();
</script>
